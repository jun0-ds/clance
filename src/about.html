<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>About Clance</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      user-select: none;
    }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .version { font-size: 13px; opacity: 0.5; margin-bottom: 12px; }
    .desc { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
    a {
      color: #4facfe;
      text-decoration: none;
      font-size: 13px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Clance</h1>
  <div class="version" id="version">v--</div>
  <div class="desc">Claude + Glance</div>
  <a href="https://github.com/jun0-ds/clance" target="_blank">github.com/jun0-ds/clance</a>
  <script>
    window.__TAURI__.app.getVersion().then(v => {
      document.getElementById('version').textContent = 'v' + v;
    });
  </script>
</body>
</html>
